<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="coinGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#2563eb" />
    </radialGradient>
    <linearGradient id="eyeGradient" x1="0" y1="20" x2="40" y2="20" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60a5fa" />
      <stop offset="1" stop-color="#2563eb" />
    </linearGradient>
  </defs>
  <!-- Coin (iris) -->
  <circle cx="20" cy="20" r="12" fill="url(#coinGradient)" stroke="#2563eb" stroke-width="2" />
  <!-- Eye outline -->
  <ellipse cx="20" cy="20" rx="17" ry="10" fill="none" stroke="url(#eyeGradient)" stroke-width="2.5" />
  <!-- Eye highlight -->
  <ellipse cx="25" cy="17" rx="2.5" ry="1.2" fill="#fff" fill-opacity="0.7" />
</svg> 